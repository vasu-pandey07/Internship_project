defaults:
  run:
    working-directory: ./server

name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - server/**
      - .github/workflows/backend.yml

permissions:
  contents: read

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (LTS) with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build backend
        run: npm run build --if-present

  deploy:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy (hook or API)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          if [ -n "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            echo "Using Render deploy hook"
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
            exit 0
          fi

          if [ -n "${RENDER_API_KEY:-}" ] && [ -n "${RENDER_SERVICE_ID:-}" ]; then
            echo "Using Render API deploy"
            curl -fsS -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear"}'
            exit 0
          fi

          echo "::error::No Render deployment configuration found. Set RENDER_DEPLOY_HOOK_URL or both RENDER_API_KEY and RENDER_SERVICE_ID in GitHub Secrets."
          exit 1

      - name: Notify deployment result (optional)
        if: always() && secrets.DEPLOYMENT_WEBHOOK_URL != ''
        env:
          DEPLOYMENT_WEBHOOK_URL: ${{ secrets.DEPLOYMENT_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$JOB_STATUS" = "success" ]; then
            MESSAGE="Backend deployment succeeded for ${REPO} at commit ${SHA}."
          else
            MESSAGE="Backend deployment failed for ${REPO} at commit ${SHA}."
          fi
          payload=$(printf '{"text":"%s"}' "$MESSAGE")
          curl -fsS -H "Content-Type: application/json" -d "$payload" "$DEPLOYMENT_WEBHOOK_URL"